# Copy to config.yaml and edit. Any value here can be overridden via CLI flag, e.g.:
#   python ortho2dataset.py --config config.yaml --res 0.10

tif: /path/to/orthomosaic.tif
out: dataset/my_dataset/

# Output resolution, in meters/pixel. E.g. tile_size=1024, res=0.20 -> ~204.8m per tile side.
# Use 0 to keep the orthomosaic's native resolution (no resampling).
res: 0.20

tile_size: 1024
format: both   # coco, yolo, or both

# Fraction of images used to preview the dataset's annotations. Set to 0 to skip.
preview: 0.05

# Each key becomes a category/class in the output dataset — name it whatever you want,
# it doesn't need to match the layer or file name.
shapes:
  # Single-layer source: just the path.
  class1: /path/to/lots.gpkg

  # Multi-layer GeoPackage: needs path + layer (use --list-layers to discover names).
  # The same file can supply more than one class, one per layer:
  class2:
    path: /path/to/data.gpkg
    layer: layer1
  class3:
    path: /path/to/data.gpkg
    layer: layer2

# Optional: splits tiles into train/val/test. Ratios must sum to 1.0; omit "test" to skip it.
# Remove this section for a single flat dataset.
split:
  train: 0.7
  val:   0.2
  test:  0.1
  seed:  42   # optional, for a reproducible shuffle


